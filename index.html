<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Plus - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2 id="auth-title">Sign In</h2>
        <form id="auth-form" action="cpr.html" method="GET">
            <div class="form-group signup-only hidden">
                <label>Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. john_doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="btn-submit" class="btn">Sign In</button>
        </form>
        <p class="toggle-text">
            <span id="txt-toggle">Don't have an account?</span>
            <a href="#" id="auth-toggle">Create Account</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
